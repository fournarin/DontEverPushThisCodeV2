name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: Declare workflow permissions.
# Why scope per-workflow instead of repo-wide?
#   → Principle of Least Privilege: ถ้า workflow นึงถูก compromise
#     จะไม่กระทบ workflow อื่น เพราะแต่ละ workflow มีสิทธิ์เฉพาะของตัวเอง
permissions:
  contents: read
  security-events: write   # TODO#0a: อัปโหลด SARIF ขึ้น GitHub Security tab
  issues: write            # TODO#0b: Gitleaks/Sonar comment บน PR/issues ได้
  pull-requests: write     # TODO#0b: comment บน PR ได้
  id-token: write          # TODO#0c: ขอ OIDC token สำหรับ cloud auth
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # GATE#0: Secret scanning (TruffleHog + Gitleaks)
  # ─────────────────────────────────────────────────────────────
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#1: fetch-depth: 0 เพื่อดึง git history ทั้งหมด
          # เหตุผล: secret อาจถูก commit ไว้ในอดีตแล้ว delete ออกทีหลัง
          # แต่ยังอยู่ใน git history → ต้องดึงมาทั้งหมดถึงจะสแกนเจอ
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          # TODO#2: base = branch หลัก, head = HEAD ปัจจุบัน
          # เพื่อให้ scan เฉพาะ diff ของ commit ที่เปลี่ยนไป ไม่ใช่ทั้ง repo
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # TODO#3: --only-verified รายงานเฉพาะ secret ที่ยังใช้งานได้จริง
          # ลด noise จาก false positive (เช่น key ที่ expire ไปแล้ว)
          extra_args: --only-verified

      # TODO#4: Gitleaks — scan regex patterns ที่ดูเหมือน secret
      # Q: TruffleHog vs Gitleaks?
      #   TruffleHog: verify live creds → false positive ต่ำ แต่ miss creds ที่ revoked แล้ว
      #   Gitleaks: match regex patterns → false positive สูงกว่า แต่ครอบคลุมกว่า
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ─────────────────────────────────────────────────────────────
  # GATE#1a: SAST via SonarQube
  # ─────────────────────────────────────────────────────────────
  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#5: fetch-depth: 0 เช่นเดียวกัน
          # SonarCloud ต้องการ full history เพื่อ blame analysis
          # และคำนวณ "new code" vs "old code" ได้ถูกต้อง
          fetch-depth: 0

      # TODO#6: SonarQube scan
      # Q: ทำไม findings ไม่โชว์ใน GitHub Security tab?
      #   SonarCloud ใช้ dashboard ของตัวเอง ไม่ได้ส่ง SARIF ผ่าน upload-sarif action
      #   จึงไม่ปรากฏใน Security tab → ต้องดูที่ https://sonarcloud.io แทน
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # GATE#1b: SAST via CodeQL (results in GitHub Security tab)
  # ─────────────────────────────────────────────────────────────
  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    strategy:
      matrix:
        # TODO#7: Next.js และ React เขียนด้วย JavaScript/TypeScript
        # CodeQL ใช้ 'javascript' ครอบคลุมทั้งสองภาษา
        language: [ 'javascript' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # TODO#8: เปิดใช้ทั้งสอง query suite
          # security-extended    → OWASP / CWE Top 25 + extra vulnerability checks
          # security-and-quality → security-extended + maintainability/code-smell rules
          # Q: ทำไมต้องใช้ทั้งคู่?
          #   security-extended เน้น security อย่างเดียว
          #   security-and-quality เพิ่ม code quality ด้วย → ครอบคลุมทั้ง bug และ smell
          queries: security-extended,security-and-quality

      # TODO#9: analyze step พร้อม category
      # Q: ถ้าสอง matrix languages ใช้ category เดียวกันจะเกิดอะไร?
      #   ผล scan ของภาษาที่สองจะ overwrite ภาษาแรกใน Security tab
      #   → ต้องใส่ /language:xxx เพื่อให้แต่ละภาษามี namespace ของตัวเอง
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────────────────────
  # GATE#2: Dependency scanning via OWASP Dependency-Check
  # ─────────────────────────────────────────────────────────────
  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#10: Setup Node 20
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO#11: Install npm deps ก่อน scan
      # Dependency-Check ต้องการ node_modules เพื่อ resolve full dependency tree
      - name: Install dependencies
        run: npm ci

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'DontEverPushThisCodeV2'
          path: '.'
          # TODO#12: SARIF format เพื่อ integrate กับ GitHub Security tab
          format: 'SARIF'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired
          # TODO#13: CVSS 7.0+ = HIGH severity
          # CVSS score: 0-3.9 Low / 4.0-6.9 Medium / 7.0-8.9 High / 9.0-10.0 Critical

      # TODO#14: Upload SARIF ขึ้น Security tab
      - name: Upload Depcheck SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      # TODO#15: Upload raw report เป็น artifact ดาวน์โหลดได้
      - name: Upload Depcheck HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/

  # ─────────────────────────────────────────────────────────────
  # GATE#3: Container/Image scanning via Trivy
  # ─────────────────────────────────────────────────────────────
  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#16: Build Docker image ก่อน scan
      - name: Build Docker image
        run: docker build -t my-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          # TODO#17: sarif format เพื่อ upload ขึ้น Security tab ได้
          format: 'sarif'
          output: 'trivy-results.sarif'
          # TODO#18: report ทุก severity เพื่อให้เห็นภาพรวมทั้งหมด
          # Q: Should LOW/MEDIUM block a build?
          #   ไม่ควร block — เพราะจะทำให้ deploy ไม่ได้เลย
          #   ควรรายงานไว้และแก้ใน sprint ถัดไป
          #   HIGH/CRITICAL ถึงควร block เพราะความเสี่ยงสูง
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          # TODO#19: ignore-unfixed: true = ไม่รายงาน CVE ที่ยังไม่มี patch
          # ช่วยลด noise จาก CVE ที่ developer ทำอะไรไม่ได้อยู่แล้ว
          ignore-unfixed: true

      # TODO#20: Upload Trivy SARIF ขึ้น Security tab
      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # TODO#21: Upload raw SARIF เป็น artifact ดาวน์โหลดได้
      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # GATE#4: IaC scanning — skipped (out of scope)
  # GATE#5: DAST (ZAP workshop) — skipped